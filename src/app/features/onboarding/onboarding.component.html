<div class="ob-page">
  <div class="ob-bar">
    <div *ngFor="let s of slides; let i=index" class="ob-seg" [class.done]="i<=current()"></div>
  </div>

  <div class="ob-slides">
    <div class="ob-slide" *ngFor="let s of slides; let i=index" [class.visible]="i===current()">
      <div class="ob-art">

        <!-- Truck SVG -->
        <ng-container *ngIf="s.key==='truck'">
          <svg viewBox="0 0 320 240" fill="none">
            <circle cx="50" cy="55" r="22" fill="#D01A27" opacity=".15"/>
            <path d="M30 62 Q46 42 56 54 Q70 42 84 54" stroke="#D01A27" stroke-width="1.5" fill="none" opacity=".35"/>
            <rect x="56" y="108" width="206" height="68" rx="8" fill="#D01A27"/>
            <rect x="206" y="108" width="60" height="68" rx="6" fill="#A8121C"/>
            <rect x="212" y="114" width="46" height="34" rx="4" fill="#DAEEFF" opacity=".55"/>
            <rect x="72" y="120" width="14" height="14" rx="2" fill="white" opacity=".5"/>
            <rect x="90" y="120" width="14" height="14" rx="2" fill="white" opacity=".5"/>
            <rect x="108" y="120" width="14" height="14" rx="2" fill="white" opacity=".5"/>
            <circle cx="228" cy="180" r="15" fill="#1a1a1a"/><circle cx="228" cy="180" r="7" fill="#444"/>
            <circle cx="254" cy="180" r="15" fill="#1a1a1a"/><circle cx="254" cy="180" r="7" fill="#444"/>
            <circle cx="88"  cy="180" r="15" fill="#1a1a1a"/><circle cx="88"  cy="180" r="7" fill="#444"/>
            <rect x="126" y="76" width="50" height="50" rx="5" fill="white" stroke="#D01A27" stroke-width="2"/>
            <line x1="126" y1="101" x2="176" y2="101" stroke="#D01A27" stroke-width="1.5"/>
            <line x1="151" y1="76"  x2="151" y2="126" stroke="#D01A27" stroke-width="1.5"/>
          </svg>
        </ng-container>

        <!-- Rider SVG -->
        <ng-container *ngIf="s.key==='rider'">
          <svg viewBox="0 0 320 240" fill="none">
            <circle cx="185" cy="62" r="22" fill="#222"/>
            <rect x="162" y="86" width="46" height="56" rx="9" fill="#D01A27"/>
            <rect x="148" y="92" width="16" height="42" rx="8" fill="#D01A27"/>
            <rect x="196" y="92" width="16" height="42" rx="8" fill="#D01A27"/>
            <rect x="205" y="96" width="48" height="50" rx="7" fill="white" stroke="#D01A27" stroke-width="2"/>
            <line x1="205" y1="121" x2="253" y2="121" stroke="#D01A27" stroke-width="1.5"/>
            <line x1="229" y1="96"  x2="229" y2="146" stroke="#D01A27" stroke-width="1.5"/>
            <rect x="76" y="100" width="60" height="44" rx="7" fill="white" stroke="#D01A27" stroke-width="1.5"/>
            <path d="M76 110 L106 126 L136 110" stroke="#D01A27" stroke-width="1.5" fill="none"/>
          </svg>
        </ng-container>

        <!-- QR SVG -->
        <ng-container *ngIf="s.key==='qr'">
          <svg viewBox="0 0 320 240" fill="none">
            <rect x="58" y="52" width="126" height="148" rx="12" fill="#D01A27"/>
            <rect x="78" y="36" width="86" height="30" rx="15" fill="none" stroke="#D01A27" stroke-width="5.5"/>
            <rect x="76" y="84" width="92" height="92" rx="5" fill="white"/>
            <rect x="82"  y="90"  width="24" height="24" rx="3" fill="#0D0D0D"/>
            <rect x="118" y="90"  width="24" height="24" rx="3" fill="#0D0D0D"/>
            <rect x="82"  y="126" width="24" height="24" rx="3" fill="#0D0D0D"/>
            <rect x="118" y="116" width="8"  height="8"  fill="#0D0D0D"/>
            <rect x="130" y="128" width="8"  height="8"  fill="#0D0D0D"/>
            <rect x="186" y="82" width="76" height="128" rx="14" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
            <rect x="192" y="92" width="64" height="98"  rx="7" fill="#DAEEFF" opacity=".65"/>
            <rect x="200" y="104" width="48" height="48" rx="4" fill="none" stroke="#D01A27" stroke-width="2.5"/>
            <path d="M200 112L200 104L208 104" stroke="#D01A27" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <path d="M240 104L248 104L248 112" stroke="#D01A27" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <path d="M200 144L200 152L208 152" stroke="#D01A27" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <path d="M240 152L248 152L248 144" stroke="#D01A27" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          </svg>
        </ng-container>

      </div>
      <div class="ob-copy">
        <h1>{{ s.headline }}</h1>
        <p>{{ s.body }}</p>
      </div>
    </div>
  </div>

  <div class="ob-footer">
    <ng-container *ngIf="current() === slides.length-1; else navTpl">
      <button class="btn-ghost" (click)="goLogin()">Sign In</button>
      <button class="btn-red"   (click)="goRegister()">Create Account</button>
    </ng-container>
    <ng-template #navTpl>
      <button class="btn-ghost" (click)="skip()">Skip</button>
      <button class="btn-red"   (click)="next()">Next</button>
    </ng-template>
  </div>
</div>
