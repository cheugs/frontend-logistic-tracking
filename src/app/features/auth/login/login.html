<div class="auth-page">
  <div class="auth-logo">
    <svg viewBox="0 0 48 48" fill="none" width="48" height="48">
      <rect x="6" y="14" width="36" height="28" rx="5" fill="#D01A27"></rect>
      <rect x="14" y="8" width="20" height="12" rx="3" fill="none" stroke="#D01A27" stroke-width="3"></rect>
      <line x1="16" y1="26" x2="32" y2="26" stroke="white" stroke-width="2" stroke-dasharray="4 3"></line>
      <circle cx="24" cy="34" r="3" fill="white"></circle>
    </svg>
    <span class="brand-name">QuickDeliver</span>
  </div>

  <h2>Welcome back</h2>
  <p class="sub">Sign in to continue tracking your packages</p>

  <form class="form" (ngSubmit)="login()">
    <div class="fld">
      <label class="form-label">Email</label>
      <input
        type="email"
        name="email"
        [(ngModel)]="email"
        placeholder="Enter your email"
        required
      />
    </div>

    <div class="fld">
      <label class="form-label">Password</label>
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        placeholder="Enter your password"
        required
      />
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>

    <button type="submit" class="btn-red" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>
  </form>

  <p class="link">
    Don't have an account? <a routerLink="/register">Create one</a>
  </p>
</div>
